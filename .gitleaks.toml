title = "Teami public secret scanner"

# SEC-U1 allowlist IDs are intentionally narrow and documented here because
# placeholder examples should never become silent scanner exceptions.
#
# SEC-U1-SCANNER-CONFIG: the scanner config and implementation may contain
#   detection regexes and synthetic examples needed to test the rules.
# SEC-U1-SOURCE-PRIVATE-BUILD-TRAIL: the private build repo still contains
#   private/ and publication-control files that are excluded from the public
#   artifact by the never-public boundary. This allowlist is active only while
#   the private boundary marker exists.
# SEC-U1-SOURCE-PRELAUNCH-HOSTED-HANDLE: the private build repo may temporarily
#   contain pre-CFG-U1 hosted handles in config.example.json. The public export
#   does not contain the private manifest marker, so this source-only exception
#   is not active in the public artifact.
# SEC-U1-TEST-CREDENTIAL-PLACEHOLDER: deterministic unit tests may use short
#   fake setup grants and broker credentials that do not meet live-token shape.
# SEC-U1-TEST-STAGED-BUILD-FIXTURE: frozen staged-build gate fixtures contain
#   deliberately planted fake findings so later gate modules can prove they fail.
# SEC-U1-DIR-MODE-FIXTURE: frozen scanner fixtures plant synthetic secret-shaped
#   values under test/fixtures/security-scan-dir to prove standalone dir scans fail.
# SEC-U1-TEST-LOCAL-PATH-PLACEHOLDER: deterministic unit tests may use local
#   path examples to prove path sanitization behavior.
# SEC-U1-DOC-LOCAL-PATH-PLACEHOLDER: docs may use obvious placeholders such as
#   C:/abs/repo or <existing checkout>; real local paths are not allowed.
# SEC-U1-PUBLIC-HOSTED-BETA-ENDPOINT: the public beta setup endpoint is a
#   deliberate public service handle, allowed only in setup-facing public files.

[allowlist]
description = "Scanner config and helper source contain rule patterns, not committed secrets."
paths = [
  '''^\.gitleaks\.toml$''',
  '''^scripts/security-scan\.mjs$''',
]

[teami.source_mode]
marker_path = "private/publication/never-public.txt"
allowlist_id = "SEC-U1-SOURCE-PRIVATE-BUILD-TRAIL"
description = "Private source-only and publication-control surfaces are excluded from the public artifact."
paths = [
  '''^private/''',
]

[[teami.source_rule_allowlists]]
allowlist_id = "SEC-U1-SOURCE-PRELAUNCH-HOSTED-HANDLE"
description = "Temporary source-only exception for CFG-U1-owned prelaunch hosted defaults."
rules = [
  "teami-private-service-handle",
]
paths = [
  '''^CHANGELOG\.md$''',
  '''^execution/integrations/linear/config\.example\.json$''',
]

[[rules]]
id = "teami-setup-token"
description = "Teami setup grants must never be committed."
regex = '''\b(tm_setup_v1_[A-Za-z0-9][A-Za-z0-9_-]{12,}_[A-Za-z0-9][A-Za-z0-9_-]{24,})\b'''
secretGroup = 1
history = true
history_regex = '''tm_setup_v1_[A-Za-z0-9][A-Za-z0-9_-]{12,}_[A-Za-z0-9][A-Za-z0-9_-]{24,}'''
keywords = [
  "tm_setup_v1_",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-CREDENTIAL-PLACEHOLDER"
description = "Short synthetic setup grants in tests are placeholders, not live setup grants."
paths = [
  '''^execution/integrations/linear/test/''',
]
regexes = [
  '''tm_setup_v1_(?:grant_secret|init_grant|github_resume|for_broker|local)''',
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-STAGED-BUILD-FIXTURE"
description = "The staged-build planted-secret fixture carries a strict fake setup grant to prove scanner gates fire."
paths = [
  '''^test/fixtures/staged-build/''',
]
regexes = [
  '''tm_setup_v1_stagedfixture_FAKESECRET[0-9A-Za-z_-]+''',
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-DIR-MODE-FIXTURE"
description = "Frozen dir-mode scanner fixtures plant a synthetic setup grant so standalone dir scans can prove they fail."
paths = [
  '''^test/fixtures/security-scan-dir/''',
]
regexes = [
  '''tm_setup_v1_fixtureCase12_FAKESECRET0123456789abcdef0123456789''',
]

[[rules]]
id = "teami-runner-credential"
description = "Runner inbox credentials using the ri_ prefix must never be committed."
regex = '''\b(ri_[A-Za-z0-9_-]{24,}(?:\.[A-Za-z0-9_-]{24,})?)\b'''
secretGroup = 1
history = true
history_regex = '''ri_[A-Za-z0-9_-]{24,}(\.[A-Za-z0-9_-]{24,})?'''
keywords = [
  "ri_",
]

[[rules]]
id = "teami-broker-credential"
description = "Teami GitHub broker credentials must never be committed."
regex = '''\b(tm_broker_v1\.[A-Za-z0-9_-]{16,}\.[A-Za-z0-9_-]{32,})\b'''
secretGroup = 1
history = true
history_regex = '''tm_broker_v1\.[A-Za-z0-9_-]{16,}\.[A-Za-z0-9_-]{32,}'''
keywords = [
  "tm_broker_v1.",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-CREDENTIAL-PLACEHOLDER"
description = "Short synthetic broker credentials in tests are placeholders, not live broker credentials."
paths = [
  '''^execution/integrations/linear/test/''',
]
regexes = [
  '''tm_broker_v1\.(?:segment|env|config|repo)\.sig''',
]

[[rules]]
id = "teami-token-env-assignment"
description = "TEAMI_*TOKEN assignments with secret-shaped values must never be committed."
regex = '''\bTEAMI_[A-Z0-9_]*TOKEN\b\s*[:=]\s*["']?([A-Za-z0-9_./+=-]{20,})'''
secretGroup = 1
entropy = 3.5
history = true
history_regex = '''TEAMI_[A-Z0-9_]*TOKEN[[:space:]]*[:=][[:space:]]*["'']?[A-Za-z0-9_./+=-]{32,}'''
keywords = [
  "TEAMI_",
  "TOKEN",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-CREDENTIAL-PLACEHOLDER"
description = "Tests use explicit fake token phrases to prove environment scrubbing behavior."
paths = [
  '''^execution/integrations/linear/test/''',
]
regexes = [
  '''(?:github-installation-token|github-broker-token|env-u1-github-token)''',
]

[[rules]]
id = "teami-broker-signing-key"
description = "TEAMI_BROKER_CREDENTIAL_SIGNING_KEY values must never be committed."
regex = '''\bTEAMI_BROKER_CREDENTIAL_SIGNING_KEY\b\s*[:=]\s*["']?([A-Za-z0-9_./+=-]{24,})'''
secretGroup = 1
entropy = 3.5
history = true
history_regex = '''TEAMI_BROKER_CREDENTIAL_SIGNING_KEY[[:space:]]*[:=][[:space:]]*["'']?[A-Za-z0-9_./+=-]{32,}'''
keywords = [
  "TEAMI_BROKER_CREDENTIAL_SIGNING_KEY",
]

[[rules]]
id = "supabase-service-role-key"
description = "Supabase service role keys, legacy JWTs, and sb_secret keys must never be committed."
regex = '''(?:(?:SUPABASE_SERVICE_ROLE_KEY|service[_ -]?role(?:[_ -]?key)?)[^\r\n]{0,80}(eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|sb_secret_[A-Za-z0-9_-]{20,})|\b(sb_secret_[A-Za-z0-9_-]{20,})\b)'''
secretGroup = 1
entropy = 3.5
history = true
history_regex = '''(SUPABASE_SERVICE_ROLE_KEY|service[_ -]?role)[^[:cntrl:]]{0,80}(eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|sb_secret_[A-Za-z0-9_-]{20,})'''
keywords = [
  "SUPABASE_SERVICE_ROLE_KEY",
  "service_role",
  "sb_secret_",
]

[[rules]]
id = "github-app-private-key-pem"
description = "GitHub App private-key PEM material must never be committed."
regex = '''(-----BEGIN (?:RSA |EC |OPENSSH |)PRIVATE KEY-----)'''
secretGroup = 1
history = true
history_regex = '''-----BEGIN (RSA |EC |OPENSSH |)?PRIVATE KEY-----'''
keywords = [
  "PRIVATE KEY",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-CREDENTIAL-PLACEHOLDER"
description = "Tests may contain a PEM header fixture to prove private-key content gating."
paths = [
  '''^execution/integrations/linear/test/''',
]
regexes = [
  '''-----BEGIN (?:RSA |EC |OPENSSH |)PRIVATE KEY-----''',
]

[[rules]]
id = "teami-private-service-handle"
description = "Private, prelaunch, or non-setup service handles must not leak into public surfaces."
regex = '''(?:https://ayhmwtwjthnjziwybtsu\.supabase\.co/[A-Za-z0-9_./?=&%-]*|https://github\.com/shulmansj/zanzibar\b|shulmansj/zanzibar\b)'''
history = false
keywords = [
  "ayhmwtwjthnjziwybtsu",
  "shulmansj/zanzibar",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-PUBLIC-HOSTED-BETA-ENDPOINT"
description = "Setup-facing public docs and config intentionally name the hosted public beta endpoint."
condition = "AND"
paths = [
  '''^execution/integrations/linear/config\.example\.json$''',
  '''^supabase/README\.md$''',
]
regexes = [
  '''https://ayhmwtwjthnjziwybtsu\.supabase\.co/functions/v1/teami-(?:inbox|github-broker)(?:/[A-Za-z0-9_./?=&%-]*)?''',
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-STAGED-BUILD-FIXTURE"
description = "The staged-build planted-private-pattern fixture carries a fake private handle to prove private-pattern gates fire."
paths = [
  '''^test/fixtures/staged-build/''',
]
regexes = [
  '''shulmansj/zanzibar''',
]

[[rules]]
id = "local-filesystem-path"
description = "Real local filesystem paths must not be committed to public surfaces."
regex = '''(?:\b[A-Za-z]:[\\/](?:Users[\\/][^\s`"'<>|]+|[^\\/\s`"'<>|]+[\\/][^\s`"'<>|]+)|\\\\[A-Za-z0-9_.-]{2,}\\[A-Za-z0-9_.-][^\s`"'<>|]+|/(?:Users|home)/[A-Za-z0-9._-][^\s`"'<>]*)'''
history = false
keywords = [
  "C:",
  "/Users/",
  "/home/",
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-TEST-LOCAL-PATH-PLACEHOLDER"
description = "Tests use local path placeholders to prove path and markdown sanitization behavior."
paths = [
  '''^execution/integrations/linear/test/''',
]

[[rules.allowlists]]
allowlist_id = "SEC-U1-DOC-LOCAL-PATH-PLACEHOLDER"
description = "Documentation may use obvious placeholder local paths, never real user paths."
regexes = [
  '''(?:\b[A-Za-z]:[\\/]abs[\\/][^\s`"'<>|]+|<existing checkout>|<local checkout>|<path>)''',
]

[[rules]]
id = "teami-domain-state-path"
description = "Committed .teami domain state is local runtime state and must never ship."
regex = '''^\.teami/(?:domains\.json|domains/)'''
path_regex = '''^\.teami/(?:domains\.json|domains/)'''
history = false
keywords = [
  ".teami/domains",
]

[[rules]]
id = "local-checkout-path-value"
description = "local_checkout_path values must be placeholders, not real local paths."
regex = '''\blocal_checkout_path\b\s*[:=]\s*["']?(?:[A-Za-z]:[\\/]|/(?:Users|home)/|\\\\)[^\s"',}]+'''
history = false
keywords = [
  "local_checkout_path",
]

[[rules]]
id = "domain-bind-repo-real-path"
description = "domain:bind-repo examples must not include real local paths."
regex = '''domain:bind-repo[^\r\n]*--path\s+["']?(?:[A-Za-z]:[\\/]|/(?:Users|home)/|\\\\)[^\s`"']+'''
history = false
keywords = [
  "domain:bind-repo",
  "--path",
]
